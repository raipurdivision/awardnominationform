    <script>
        // Google Sheets Configuration — Raipur Division Award Nomination
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx7WDM2HP5ukVhVtQCS2fwdJ2BvKnv9xszb8gMMK273j90Njwb5_nmtfgikZSdGYReciw/exec';

        // Auto-populate year field with current year
        document.getElementById('year').value = new Date().getFullYear();

        // Signature upload handling
        let signatureDataUrl = null;

        function handleSignatureUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                signatureDataUrl = e.target.result;
                const img = document.getElementById('sigPreviewImg');
                img.src = signatureDataUrl;
                document.getElementById('sigPreviewBox').style.display = 'flex';
                document.getElementById('sigClearBtn').style.display = 'inline-block';
            };
            reader.readAsDataURL(file);
        }

        function clearSignature() {
            signatureDataUrl = null;
            document.getElementById('sigPreviewImg').src = '';
            document.getElementById('sigPreviewBox').style.display = 'none';
            document.getElementById('sigClearBtn').style.display = 'none';
            document.getElementById('signatureUpload').value = '';
        }

        // Track submission status to prevent duplicates
        let isSubmitting = false;
        let hasSubmitted = false;

        // Form submission handler
        document.getElementById('nominationForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // Check if already submitted
            if (hasSubmitted) {
                showMessage('⚠️ Data Already Submitted! Please reset the form to submit a new nomination.', 'error');
                return;
            }

            // Check if currently submitting
            if (isSubmitting) {
                showMessage('Submission in progress, please wait...', 'error');
                return;
            }

            // Get the submit button
            const submitBtn = document.querySelector('.btn-submit');

            // Set submitting flag and disable submit button
            isSubmitting = true;
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            // Collect all form fields
            const month   = document.getElementById('month').value;
            const year    = document.getElementById('year').value;
            const empName = document.getElementById('employeeName').value;
            const desig   = document.getElementById('designation').value;
            const pfNo    = document.getElementById('pf').value;
            const dept    = document.getElementById('department').value;
            const sec     = document.getElementById('section').value;
            const dur     = document.getElementById('duration').value;
            const contrib = document.getElementById('contribution').value;
            const nominBy = document.getElementById('nominatedby').value;

            // Map to Award Nomination sheet columns:
            // Timestamp | CLI Name & HQ-1 | CLI Name-2 & HQ | Date | LP Name | Remarks | Other Remarks
            // cliName1   → Nominated By (name of nominator)
            // cliName2   → Department / Section
            // date       → Month + Year
            // lpName     → Employee Name | Designation | PF Number
            // remarks    → Contribution / Basis of Recommendation
            // otherRemarks → Duration of Service
            const params = new URLSearchParams({
                sheet:        'Award Nomination',
                cliName1:     nominBy,
                cliName2:     dept + ' / ' + sec,
                date:         month + ' (' + year + ')',
                lpName:       empName + ' | ' + desig + ' | PF: ' + pfNo,
                remarks:      contrib,
                otherRemarks: 'Duration of Service: ' + dur
            });

            try {
                // Send as form-urlencoded so Apps Script reads via e.parameter
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: params.toString()
                });

                // Mark as submitted
                hasSubmitted = true;
                showMessage('Form submitted successfully! Use Reset button to submit a new nomination.', 'success');

                // Keep the button disabled after successful submission
                submitBtn.textContent = 'Submitted';

            } catch (error) {
                console.error('Error:', error);
                showMessage('Error submitting form. Please check your Google Apps Script URL.', 'error');

                // Re-enable submission on error
                isSubmitting = false;
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit';
            }
        });

        // Handle form reset to allow resubmission
        document.getElementById('nominationForm').addEventListener('reset', function() {
            // Reset submission flags
            hasSubmitted = false;
            isSubmitting = false;

            // Re-enable submit button
            const submitBtn = document.querySelector('.btn-submit');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Submit';

            // Reset year to current year after form reset
            setTimeout(() => {
                document.getElementById('year').value = new Date().getFullYear();
            }, 0);

            // Hide any messages
            document.getElementById('message').style.display = 'none';

            // Clear signature
            clearSignature();
        });

        // Show message function
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';

            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        // Generate PDF function
        function generatePDF() {
            // Block PDF if form has not been submitted yet
            if (!hasSubmitted) {
                showMessage('⚠️ First Submit Data before generating PDF!', 'error');
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            // Get form values
            const month = document.getElementById('month').value;
            const year = document.getElementById('year').value;
            const employeeName = document.getElementById('employeeName').value;
            const designation = document.getElementById('designation').value;
            const pf = document.getElementById('pf').value;
            const department = document.getElementById('department').value;
            const section = document.getElementById('section').value;
            const duration = document.getElementById('duration').value;
            const contribution = document.getElementById('contribution').value;
            const nominatedBy = document.getElementById('nominatedby').value;

            // Validate form
            if (!employeeName || !designation || !pf || !department || !section || !duration || !contribution || !nominatedBy) {
                showMessage('Please fill all fields before generating PDF.', 'error');
                return;
            }

            // Page margins
            const margin = 15;
            const pageWidth = 210; // A4 width in mm
            const contentWidth = pageWidth - (2 * margin);

            // Helper function to draw a text box with label outside
            function drawTextBox(x, y, width, height, label, value, isBold = false) {
                // Draw label OUTSIDE the box (above it)
                doc.setFontSize(9);
                doc.setFont(undefined, 'normal');
                doc.setTextColor(80, 80, 80);
                doc.text(label, x, y - 2);

                // Draw rectangle with lighter border
                doc.setDrawColor(180, 180, 180);
                doc.setLineWidth(0.3);
                doc.rect(x, y, width, height);

                // Draw value INSIDE the box
                doc.setFontSize(10);
                doc.setFont(undefined, 'bold');
                doc.setTextColor(30, 30, 30);
                const textY = y + (height / 2) + 1.5;
                doc.text(value, x + 2, textY);
            }

            // Helper function to draw multi-line text box with label outside
            function drawMultiLineTextBox(x, y, width, height, label, value) {
                // Draw label OUTSIDE the box (above it)
                doc.setFontSize(9);
                doc.setFont(undefined, 'normal');
                doc.setTextColor(80, 80, 80);
                doc.text(label, x, y - 2);

                // Draw rectangle with lighter border
                doc.setDrawColor(180, 180, 180);
                doc.setLineWidth(0.3);
                doc.rect(x, y, width, height);

                // Draw value INSIDE the box
                doc.setFontSize(10);
                doc.setFont(undefined, 'bold');
                doc.setTextColor(30, 30, 30);
                const splitText = doc.splitTextToSize(value, width - 4);
                doc.text(splitText, x + 2, y + 6);
            }

            // Draw outer border with lighter color
            doc.setDrawColor(180, 180, 180);
            doc.setLineWidth(0.5);
            doc.rect(margin, margin, contentWidth, 267); // Full page border

            let y = margin + 5;

            // Title with border
            doc.setFontSize(16);
            doc.setFont(undefined, 'bold');
            doc.text('NOMINATION FORM UNDER MONTHLY AWARD SCHEME', pageWidth / 2, y + 5, { align: 'center' });
            y += 10;

            // Subtitle
            doc.setFontSize(12);
            doc.setFont(undefined, 'italic');
            doc.text('For Safety/Outstanding Performance', pageWidth / 2, y + 3, { align: 'center' });
            y += 12;

            // Draw horizontal line
            doc.setLineWidth(0.5);
            doc.line(margin + 5, y, pageWidth - margin - 5, y);
            y += 8;

            // Month and Year in boxes
            const halfWidth = (contentWidth - 10) / 2;
            drawTextBox(margin + 5, y, halfWidth, 12, 'Month:', month);
            drawTextBox(margin + 5 + halfWidth + 5, y, halfWidth, 12, 'Year:', year);
            y += 20;

            // Section A Header (no background)
            doc.setFontSize(11);
            doc.setFont(undefined, 'bold');
            doc.setTextColor(0, 0, 0);
            doc.text('A. EMPLOYEE DETAILS', margin + 5, y + 5);
            y += 10;

            // Employee Name (full width)
            drawTextBox(margin + 5, y, contentWidth - 10, 12, 'Name of the Employee (in clear/block letters):', employeeName.toUpperCase(), true);
            y += 18;

            // Designation and PF Number (side by side)
            drawTextBox(margin + 5, y, halfWidth, 12, 'Designation:', designation);
            drawTextBox(margin + 5 + halfWidth + 5, y, halfWidth, 12, 'PF Number:', pf);
            y += 18;

            // Department and Section (side by side)
            drawTextBox(margin + 5, y, halfWidth, 12, 'Department:', department);
            drawTextBox(margin + 5 + halfWidth + 5, y, halfWidth, 12, 'Section/Unit:', section);
            y += 18;

            // Duration of Service (full width)
            drawTextBox(margin + 5, y, contentWidth - 10, 12, 'Duration of Service (in current position):', duration);
            y += 20;

            // Section B Header (no background)
            doc.setFontSize(11);
            doc.setFont(undefined, 'bold');
            doc.setTextColor(0, 0, 0);
            doc.text('B. BASIS OF RECOMMENDATION', margin + 5, y + 5);
            y += 10;

            // Contribution (large text box)
            drawMultiLineTextBox(margin + 5, y, contentWidth - 10, 50,
                'Brief description of the employee\'s special contribution in the field of safety/work performance:',
                contribution);
            y += 58;

            // Nominated by box (on the right side) — signature image above name
            const nominatedByWidth = 80;
            const nominatedByX = pageWidth - margin - nominatedByWidth;

            // Draw signature image above the "Nominated by" name box
            if (signatureDataUrl) {
                try {
                    const imgFormat = signatureDataUrl.includes('image/png') ? 'PNG' : 'JPEG';
                    doc.setFontSize(9);
                    doc.setFont(undefined, 'normal');
                    doc.setTextColor(80, 80, 80);
                    doc.text('Signature:', nominatedByX, y - 2);
                    doc.addImage(signatureDataUrl, imgFormat, nominatedByX + 2, y + 1, nominatedByWidth - 4, 16);
                } catch(e) { /* skip if image fails */ }
                y += 24;
            }

            // Nominated by — label + value, no border
            doc.setFontSize(9);
            doc.setFont(undefined, 'normal');
            doc.setTextColor(80, 80, 80);
            doc.text('Nominated by:', nominatedByX, y);
            doc.setFontSize(10);
            doc.setFont(undefined, 'bold');
            doc.setTextColor(30, 30, 30);
            doc.text(nominatedBy, nominatedByX + 2, y + 7);
            y += 18;

            // Date — label + value, no border
            const dateWidth = (contentWidth - 10) / 2;
            const dateX = margin + 5 + dateWidth + 5;
            doc.setFontSize(9);
            doc.setFont(undefined, 'normal');
            doc.setTextColor(80, 80, 80);
            doc.text('Date:', dateX, y);
            doc.setFontSize(10);
            doc.setFont(undefined, 'bold');
            doc.setTextColor(30, 30, 30);
            doc.text(new Date().toLocaleDateString(), dateX + 2, y + 7);

            // Save PDF
            const fileName = `Nomination_${employeeName.replace(/\s+/g, '_')}_${Date.now()}.pdf`;
            doc.save(fileName);

            showMessage('PDF generated successfully!', 'success');
        }
    </script>
