<body>
    <div class="container">
        <h1>Nomination Form Under Monthly Award Scheme</h1>
        <h2>For Safety/Outstanding Performance</h2>

        <form id="nominationForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="month">Month:</label>
                    <input type="month" id="month" name="month" required>
                </div>
                <div class="form-group">
                    <label for="year">Year:</label>
                    <input type="number" id="year" name="year" min="2000" max="2100" placeholder="2024" required>
                </div>
            </div>

            <div class="section-title">A. Employee Details</div>

            <div class="form-group full-width">
                <label for="employeeName">Name of the Employee (in clear/block letters):</label>
                <input type="text" id="employeeName" name="employeeName" required style="text-transform: uppercase;">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="designation">Designation:</label>
                    <input type="text" id="designation" name="designation" required>
                </div>
                <div class="form-group">
                    <label for="pf">PF Number:</label>
                    <input type="text" id="pf" name="pf" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="department">Department:</label>
                    <input type="text" id="department" name="department" required>
                </div>
                <div class="form-group">
                    <label for="section">Section/Unit:</label>
                    <input type="text" id="section" name="section" required>
                </div>
            </div>

            <div class="form-group full-width">
                <label for="duration">Duration of Service (in current position):</label>
                <input type="text" id="duration" name="duration" placeholder="e.g., 2 years 6 months" required>
            </div>

            <div class="section-title">B. Basis of Recommendation</div>

            <div class="form-group full-width">
                <label for="contribution">Brief description of the employee's special contribution in the field of safety/work performance:</label>
                <textarea id="contribution" name="contribution" required></textarea>
            </div>

            <div class="nominatedby-by-container">
                <div class="nominatedby-by-wrapper">
                    <label for="nominatedby">Nominated by:</label>
                    <input type="text" id="nominatedby" name="nominatedby" required>
                </div>
            </div>

            <div class="button-container">
                <button type="submit" class="btn-submit">Submit</button>
                <button type="reset" class="btn-reset">Reset</button>
                <button type="button" class="btn-pdf" onclick="generatePDF()">Generate PDF</button>
            </div>

            <div id="message" class="message"></div>
        </form>
    </div>

    <script>
        // Google Sheets Configuration
        // IMPORTANT: Replace this URL with your Google Apps Script Web App URL
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzuGl8tYiim_ZXBMyJ5l0r-ubQ5V00F1F4r0kGbP9X-8nz27WdV5kvZkzTqFKOAlHDO/exec';

        // Auto-populate year field with current year
        document.getElementById('year').value = new Date().getFullYear();

        // Form submission handler
        document.getElementById('nominationForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = {
                month: document.getElementById('month').value,
                year: document.getElementById('year').value,
                employeeName: document.getElementById('employeeName').value,
                designation: document.getElementById('designation').value,
                pf: document.getElementById('pf').value,
                department: document.getElementById('department').value,
                section: document.getElementById('section').value,
                duration: document.getElementById('duration').value,
                contribution: document.getElementById('contribution').value,
                nominatedBy: document.getElementById('nominatedby').value,
                submittedAt: new Date().toLocaleString()
            };

            try {
                // Send to Google Sheets
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                showMessage('Form submitted successfully!', 'success');

                // Optional: Reset form after successful submission
                setTimeout(() => {
                    this.reset();
                    document.getElementById('year').value = new Date().getFullYear();
                }, 2000);

            } catch (error) {
                console.error('Error:', error);
                showMessage('Error submitting form. Please check your Google Apps Script URL.', 'error');
            }
        });

        // Show message function
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';

            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        // Generate PDF function
        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            // Get form values
            const month = document.getElementById('month').value;
            const year = document.getElementById('year').value;
            const employeeName = document.getElementById('employeeName').value;
            const designation = document.getElementById('designation').value;
            const pf = document.getElementById('pf').value;
            const department = document.getElementById('department').value;
            const section = document.getElementById('section').value;
            const duration = document.getElementById('duration').value;
            const contribution = document.getElementById('contribution').value;
            const nominatedBy = document.getElementById('nominatedby').value;

            // Validate form
            if (!employeeName || !designation || !pf || !department || !section || !duration || !contribution || !nominatedBy) {
                showMessage('Please fill all fields before generating PDF.', 'error');
                return;
            }

            // Page margins
            const margin = 15;
            const pageWidth = 210; // A4 width in mm
            const contentWidth = pageWidth - (2 * margin);

            // Helper function to draw a text box with label outside
            function drawTextBox(x, y, width, height, label, value, isBold = false) {
                // Draw label OUTSIDE the box (above it)
                doc.setFontSize(9);
                doc.setFont(undefined, 'normal');
                doc.setTextColor(80, 80, 80);
                doc.text(label, x, y - 2);

                // Draw rectangle with lighter border
                doc.setDrawColor(180, 180, 180);
                doc.setLineWidth(0.3);
                doc.rect(x, y, width, height);

                // Draw value INSIDE the box
                doc.setFontSize(10);
                doc.setFont(undefined, 'bold');
                doc.setTextColor(30, 30, 30);
                const textY = y + (height / 2) + 1.5;
                doc.text(value, x + 2, textY);
            }

            // Helper function to draw multi-line text box with label outside
            function drawMultiLineTextBox(x, y, width, height, label, value) {
                // Draw label OUTSIDE the box (above it)
                doc.setFontSize(9);
                doc.setFont(undefined, 'normal');
                doc.setTextColor(80, 80, 80);
                doc.text(label, x, y - 2);

                // Draw rectangle with lighter border
                doc.setDrawColor(180, 180, 180);
                doc.setLineWidth(0.3);
                doc.rect(x, y, width, height);

                // Draw value INSIDE the box
                doc.setFontSize(10);
                doc.setFont(undefined, 'bold');
                doc.setTextColor(30, 30, 30);
                const splitText = doc.splitTextToSize(value, width - 4);
                doc.text(splitText, x + 2, y + 6);
            }

            // Draw outer border with lighter color
            doc.setDrawColor(180, 180, 180);
            doc.setLineWidth(0.5);
            doc.rect(margin, margin, contentWidth, 267); // Full page border

            let y = margin + 5;

            // Title with border
            doc.setFontSize(16);
            doc.setFont(undefined, 'bold');
            doc.text('NOMINATION FORM UNDER MONTHLY AWARD SCHEME', pageWidth / 2, y + 5, { align: 'center' });
            y += 10;

            // Subtitle
            doc.setFontSize(12);
            doc.setFont(undefined, 'italic');
            doc.text('For Safety/Outstanding Performance', pageWidth / 2, y + 3, { align: 'center' });
            y += 12;

            // Draw horizontal line
            doc.setLineWidth(0.5);
            doc.line(margin + 5, y, pageWidth - margin - 5, y);
            y += 8;

            // Month and Year in boxes
            const halfWidth = (contentWidth - 10) / 2;
            drawTextBox(margin + 5, y, halfWidth, 12, 'Month:', month);
            drawTextBox(margin + 5 + halfWidth + 5, y, halfWidth, 12, 'Year:', year);
            y += 20;

            // Section A Header (no background)
            doc.setFontSize(11);
            doc.setFont(undefined, 'bold');
            doc.setTextColor(0, 0, 0);
            doc.text('A. EMPLOYEE DETAILS', margin + 5, y + 5);
            y += 10;

            // Employee Name (full width)
            drawTextBox(margin + 5, y, contentWidth - 10, 12, 'Name of the Employee (in clear/block letters):', employeeName.toUpperCase(), true);
            y += 18;

            // Designation and PF Number (side by side)
            drawTextBox(margin + 5, y, halfWidth, 12, 'Designation:', designation);
            drawTextBox(margin + 5 + halfWidth + 5, y, halfWidth, 12, 'PF Number:', pf);
            y += 18;

            // Department and Section (side by side)
            drawTextBox(margin + 5, y, halfWidth, 12, 'Department:', department);
            drawTextBox(margin + 5 + halfWidth + 5, y, halfWidth, 12, 'Section/Unit:', section);
            y += 18;

            // Duration of Service (full width)
            drawTextBox(margin + 5, y, contentWidth - 10, 12, 'Duration of Service (in current position):', duration);
            y += 20;

            // Section B Header (no background)
            doc.setFontSize(11);
            doc.setFont(undefined, 'bold');
            doc.setTextColor(0, 0, 0);
            doc.text('B. BASIS OF RECOMMENDATION', margin + 5, y + 5);
            y += 10;

            // Contribution (large text box)
            drawMultiLineTextBox(margin + 5, y, contentWidth - 10, 50,
                'Brief description of the employee\'s special contribution in the field of safety/work performance:',
                contribution);
            y += 58;

            // Nominated by box (on the right side)
            const nominatedByWidth = 80; // Width for the text box
            const nominatedByX = pageWidth - margin - nominatedByWidth; // Position from right
            drawTextBox(nominatedByX, y, nominatedByWidth, 12, 'Nominated by:', nominatedBy, true);
            y += 20;

            // Signature and Date sections
            const signatureWidth = (contentWidth - 10) / 2;
            drawTextBox(margin + 5, y, signatureWidth, 20, 'Signature:', '');
            drawTextBox(margin + 5 + signatureWidth + 5, y, signatureWidth - 5, 20, 'Date:', new Date().toLocaleDateString());

            // Save PDF
            const fileName = `Nomination_${employeeName.replace(/\s+/g, '_')}_${Date.now()}.pdf`;
            doc.save(fileName);

            showMessage('PDF generated successfully!', 'success');
        }
    </script>
